name: Update Scholar Citations

on:
  schedule:
    - cron: "0 8 * * *" # daily at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-search-results pyyaml

      - name: Run scholar citations update
        run: python bin/update_scholar_citations.py
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}

      - name: Commit and push citations.yml if changed
        run: |
          if [ -n "$(git status --porcelain _data/citations.yml)" ]; then
            git config --local user.name "github-actions[bot]"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git add _data/citations.yml
            git commit -m "chore: update Scholar citations [skip deploy]"
            git push
          else
            echo "No changes to _data/citations.yml"
          fi
