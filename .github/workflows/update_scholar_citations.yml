name: Update Scholar Citations

on:
  schedule:
    - cron: "0 8 * * *" # daily at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scholar-citations
  cancel-in-progress: false

jobs:
  update:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13.14"

      - name: Install dependencies
        run: >-
          python -m pip install --require-hashes
          -r requirements-citations.txt
          -r requirements-build.txt

      - name: Audit citation dependency graphs
        run: |
          pip-audit --strict --requirement requirements-build.txt --no-deps --disable-pip
          pip-audit --strict --requirement requirements-citations.txt --no-deps --disable-pip

      - name: Test scholar citation updater
        run: python test/citation_updater_contract_test.py

      - name: Run scholar citations update
        run: python bin/update_scholar_citations.py
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}

      - name: Upload generated citations
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scholar-citations
          path: _data/citations.yml
          if-no-files-found: error
          retention-days: 1

  commit:
    needs: update
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout artifact source revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Download generated citations
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: scholar-citations
          path: ${{ runner.temp }}/citations

      - name: Commit and push citations.yml if changed
        run: |
          set -euo pipefail
          install -m 0644 "$RUNNER_TEMP/citations/citations.yml" _data/citations.yml
          if [ -n "$(git status --porcelain _data/citations.yml)" ]; then
            git config --local user.name "github-actions[bot]"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git add _data/citations.yml
            git commit -m "chore: update Scholar citations"
            default_branch="${{ github.event.repository.default_branch }}"
            for attempt in 1 2 3; do
              git fetch --no-tags origin "$default_branch"
              if ! git rebase "origin/$default_branch"; then
                git rebase --abort || true
                echo "Citation update conflicts with the latest $default_branch; refusing to overwrite it." >&2
                exit 1
              fi
              if git push origin "HEAD:$default_branch"; then
                exit 0
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "Citation push failed after 3 attempts." >&2
                exit 1
              fi
              echo "Citation push raced with another update; retrying ($attempt/3)." >&2
            done
          else
            echo "No changes to _data/citations.yml"
          fi
