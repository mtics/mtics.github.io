name: Deploy site

on:
  push:
    branches:
      - main
  schedule:
    # Daily at 09:00 UTC — ~1h after the 08:00 UTC Scholar-citation update commit.
    # Citation commits use GITHUB_TOKEN and cannot trigger a workflow, so this
    # scheduled build is what actually publishes refreshed citation counts.
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true # Gemfile.lock is committed → reproducible, cached installs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20" # required by al-folio v1 Tailwind build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system and notebook dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip install --upgrade nbconvert

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
